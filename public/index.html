<!doctype html>
<html itemscope itemtype="http://schema.org/WebPage" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- CL Favicon Icons -->
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="%PUBLIC_URL%/images/favicon/TC-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="%PUBLIC_URL%/images/favicon/RM-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="48x48"
      href="%PUBLIC_URL%/images/favicon/RM-48x48.png"
    />

    <!-- Web App Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/images/favicon/manifest.json" />

    <!-- Theme Colors -->
    <meta name="theme-color" content="#ffffff" />
    <meta name="msapplication-TileColor" content="#ffffff" />

    <!-- Canonical -->
    <link rel="canonical" href="%PUBLIC_URL%/" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,700|Raleway:400,800,900"
      rel="stylesheet"
    />

    <script>
      // SPA deep-link support for GitHub Pages (paired with public/404.html).
      // Based on https://github.com/rafgraph/spa-github-pages
      (function handleSpaRedirect(l) {
        if (l.search && l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    
    <title>PKT × DZ Philanthropy</title>
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
